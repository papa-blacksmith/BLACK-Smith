<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#090b11">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>BLACK Smith Ver0.4 α</title>
<style>
:root{
 --bg:#07090e;--panel:#111722;--panel2:#171f2c;--line:#344155;
 --text:#f6f7f9;--muted:#9aa6b8;--gold:#f2bf59;--gold2:#b96f27;
 --fire1:#ffdb6c;--fire2:#ff7b28;--fire3:#e3321d;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#05070b;color:var(--text);font-family:system-ui,-apple-system,"Segoe UI","Yu Gothic",sans-serif}
button,input{font:inherit}
button{cursor:pointer}
#app{min-height:100dvh;max-width:580px;margin:auto;position:relative;overflow:hidden;background:#0a0d13}
.screen{display:none;min-height:100dvh;padding:18px 16px 100px;position:relative}
.screen.active{display:block;animation:screenIn .28s ease}
.screen.title.active{display:flex}
@keyframes screenIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

.forge-bg{
 position:fixed;inset:0;max-width:580px;margin:auto;pointer-events:none;overflow:hidden;z-index:0;
 background:
 linear-gradient(rgba(3,4,8,.45),rgba(3,4,8,.75)),
 radial-gradient(circle at 50% 90%,rgba(255,103,25,.2),transparent 28%),
 repeating-linear-gradient(90deg,#1a2029 0 64px,#151a22 64px 67px),
 linear-gradient(#1a1f28,#090c11);
}
.forge-bg:before{
 content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);
 width:88%;height:33%;background:
 linear-gradient(135deg,transparent 49%,rgba(255,255,255,.035) 50% 52%,transparent 53%) 0 0/42px 42px,
 #0b0f15;border-top:2px solid #313947;clip-path:polygon(8% 0,92% 0,100% 100%,0 100%);
}
.wall-beams{position:absolute;inset:0;background:
 linear-gradient(90deg,transparent 0 7%,rgba(0,0,0,.36) 7% 10%,transparent 10% 90%,rgba(0,0,0,.36) 90% 93%,transparent 93%),
 linear-gradient(180deg,transparent 0 15%,rgba(0,0,0,.45) 15% 18%,transparent 18%)}

.title{flex-direction:column;justify-content:center;text-align:center;padding-bottom:46px;z-index:1;background:radial-gradient(circle at 50% 30%,rgba(104,75,35,.15),transparent 42%)}
.logo{width:138px;height:138px;margin:0 auto 22px;border-radius:50%;border:2px solid #725a2e;background:radial-gradient(circle,#151a22 0 58%,#05070a 59%);box-shadow:0 0 70px rgba(242,191,89,.18);position:relative}
.logo:before,.logo:after{content:"";position:absolute;width:86px;height:15px;left:50%;top:50%;background:linear-gradient(90deg,#9da6b8,#f1f3f7 45%,#949db0);border-radius:5px;box-shadow:0 4px 7px #000}
.logo:before{transform:translate(-50%,-50%) rotate(45deg)}.logo:after{transform:translate(-50%,-50%) rotate(-45deg)}
h1{font-size:44px;line-height:.91;letter-spacing:.09em;margin:0;font-weight:950;text-shadow:0 4px 18px #000}
h1 small{display:block;color:var(--gold);font-size:13px;letter-spacing:.4em;margin-top:16px}
.sub{color:#a9b5c7;font-size:13px;line-height:1.8;margin:19px auto 28px}
.primary,.secondary{border-radius:14px;padding:15px 16px;font-weight:900;border:0;width:100%;position:relative;overflow:hidden}
.primary{background:linear-gradient(135deg,#f7cf70,#b76e25);color:#171009;box-shadow:0 12px 32px rgba(194,113,36,.26)}
.primary:after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 15%,rgba(255,255,255,.4) 42%,transparent 65%);transform:translateX(-120%);transition:.5s}
.primary:hover:after{transform:translateX(120%)}
.secondary{background:linear-gradient(#1d2532,#161c26);color:#fff;border:1px solid #3b485d}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;position:relative;z-index:2}
.brand{font-weight:950;letter-spacing:.08em}.coin{padding:7px 11px;border-radius:999px;background:rgba(22,28,39,.88);border:1px solid #354155;font-size:13px;backdrop-filter:blur(8px)}
.card{background:linear-gradient(145deg,rgba(25,33,46,.96),rgba(13,18,27,.97));border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 18px 44px rgba(0,0,0,.32);position:relative;z-index:1}
.hero{height:272px;display:grid;place-items:center;margin-bottom:14px;overflow:hidden;background:
 radial-gradient(circle at 50% 72%,rgba(242,191,89,.14),transparent 31%),
 linear-gradient(145deg,#1a2130,#10151f)}
.hero:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.045) 48%,transparent 72%);transform:translateX(-80%);animation:metalSweep 4s infinite}
@keyframes metalSweep{50%,100%{transform:translateX(90%)}}
.section{display:flex;justify-content:space-between;align-items:end;margin:20px 3px 10px;position:relative;z-index:1}.section h2{margin:0;font-size:20px}.section span{font-size:11px;color:var(--muted)}

.weapon3d{position:relative;width:150px;height:190px;transform-style:preserve-3d;animation:weaponFloat 3s ease-in-out infinite}
@keyframes weaponFloat{50%{transform:translateY(-9px) rotateY(8deg)}}
.blade{position:absolute;left:62px;top:8px;width:28px;height:124px;background:linear-gradient(90deg,#747e91 0,#f6f8fb 45%,#aab3c3 67%,#5d6574 100%);clip-path:polygon(50% 0,100% 13%,78% 100%,22% 100%,0 13%);box-shadow:8px 12px 15px rgba(0,0,0,.5),0 0 20px rgba(215,225,255,.15)}
.blade:after{content:"";position:absolute;left:45%;top:10%;width:4px;height:80%;background:rgba(255,255,255,.6);border-radius:10px}
.guard{position:absolute;left:34px;top:126px;width:84px;height:15px;background:linear-gradient(#d69a40,#7c4a1d);border-radius:9px;box-shadow:0 7px 9px #000}
.grip{position:absolute;left:65px;top:139px;width:22px;height:43px;background:repeating-linear-gradient(45deg,#4f2730 0 7px,#23151a 7px 14px);border-radius:4px;box-shadow:5px 8px 9px #000}

.result{min-height:280px;display:grid;place-items:center;text-align:center;overflow:hidden}
.resultIcon{font-size:94px;filter:drop-shadow(0 12px 10px #000)}.rarity{font-size:12px;font-weight:950;letter-spacing:.14em}.weaponName{font-size:25px;font-weight:950;margin-top:5px}.meta{font-size:12px;color:var(--muted);margin-top:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.note{font-size:11px;color:var(--muted);line-height:1.65}

.forge-stage{height:270px;position:relative;display:grid;place-items:center;overflow:hidden;border-radius:18px;background:linear-gradient(#111722,#090c11)}
.furnace{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:210px;height:132px;background:linear-gradient(145deg,#353b44,#171c24);border:2px solid #444d5c;border-radius:45% 45% 18px 18px;box-shadow:0 -15px 38px rgba(255,83,23,.12)}
.furnace-mouth{position:absolute;left:50%;top:27px;transform:translateX(-50%);width:112px;height:78px;border-radius:50% 50% 20% 20%;background:radial-gradient(circle at 50% 80%,#ffe777 0 12%,#ff7b23 34%,#711a10 62%,#050506 72%);box-shadow:0 0 36px #ff5f21,inset 0 0 28px #000}
.flame{position:absolute;bottom:45px;left:50%;width:48px;height:82px;border-radius:55% 45% 60% 40%;transform-origin:50% 100%;mix-blend-mode:screen;filter:blur(.3px)}
.f1{background:linear-gradient(#fff4a0,#ffb128 55%,#ff4c1d);animation:flame 1s ease-in-out infinite}
.f2{margin-left:-31px;background:linear-gradient(#ffe06c,#ff7d1f 58%,#d82a18);animation:flame .8s .15s ease-in-out infinite}
.f3{margin-left:28px;background:linear-gradient(#ffe879,#ff8726 58%,#d82a18);animation:flame .95s .3s ease-in-out infinite}
@keyframes flame{0%,100%{transform:translateX(-50%) scale(.85,1) rotate(-4deg)}50%{transform:translateX(-50%) scale(1.15,.82) rotate(5deg)}}
.spark{position:absolute;width:4px;height:4px;border-radius:50%;background:#ffd978;box-shadow:0 0 7px #ff7a22;animation:spark 1.8s linear infinite}
.s1{left:39%;bottom:82px}.s2{left:58%;bottom:94px;animation-delay:.5s}.s3{left:48%;bottom:70px;animation-delay:1s}.s4{left:63%;bottom:72px;animation-delay:1.3s}
@keyframes spark{to{transform:translate(var(--x,20px),-155px) scale(0);opacity:0}}
.forgeWeapon{position:relative;z-index:3;transform:translateY(-40px) rotate(-10deg);filter:drop-shadow(0 12px 13px #000);transition:.25s}

.control{margin:14px 0}.control label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;color:#d5dbe5}
input[type=range]{width:100%;accent-color:#dfa94a}
.choices{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.choice{min-width:75px;border-radius:12px;border:1px solid #354258;background:#161d29;color:#fff;padding:9px}.choice.active{border-color:var(--gold);box-shadow:0 0 18px rgba(242,191,89,.15),inset 0 0 0 1px var(--gold)}

.inventory{display:grid;grid-template-columns:1fr 1fr;gap:10px}.weaponCard{background:linear-gradient(145deg,#171e29,#10151e);border:1px solid #2e394b;color:#fff;border-radius:16px;padding:12px;text-align:left}.weaponCard .ico{font-size:55px;text-align:center;filter:drop-shadow(0 8px 6px #000)}.weaponCard .nm{font-weight:850;font-size:13px}.weaponCard .sm{font-size:10px;color:var(--muted);margin-top:4px}
.badge{display:inline-block;padding:3px 7px;border-radius:999px;border:1px solid currentColor;font-size:9px}.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:55px 10px}

.nav{display:none;position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(580px,100%);grid-template-columns:repeat(4,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(7,10,15,.96);border-top:1px solid #293447;backdrop-filter:blur(16px);z-index:20}.nav.show{display:grid}.nav button{background:transparent;border:0;color:#7f8a9d;padding:7px 2px;font-size:10px}.nav button b{display:block;font-size:20px}.nav button.active{color:var(--gold);text-shadow:0 0 12px rgba(242,191,89,.5)}
.toast{position:fixed;left:50%;bottom:96px;transform:translate(-50%,20px);opacity:0;background:#f5f6f8;color:#15171b;border-radius:999px;padding:11px 16px;font-size:12px;font-weight:800;transition:.22s;z-index:50}.toast.show{opacity:1;transform:translate(-50%,0)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.76);z-index:40;align-items:end;justify-content:center}.modal.show{display:flex}.sheet{width:min(580px,100%);max-height:84dvh;overflow:auto;background:#121925;border:1px solid #39475e;border-radius:24px 24px 0 0;padding:20px 16px calc(24px + env(safe-area-inset-bottom))}
.row{display:flex;justify-content:space-between;border-bottom:1px solid #2b3648;padding:9px 0;font-size:12px}.code{word-break:break-all;font-family:monospace;background:#080b10;border:1px solid #2d394d;border-radius:12px;padding:12px;color:#f1c96d}

.rarity-flash{position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0}
.rarity-flash.show{animation:flash .95s ease}
@keyframes flash{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
.rarity-rays{position:absolute;inset:-30%;background:repeating-conic-gradient(from 0deg,rgba(255,255,255,.45) 0 7deg,transparent 7deg 15deg);animation:spin 2.2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rarity-core{position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.75),transparent 58%)}
.shake{animation:shake .35s linear}
@keyframes shake{25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-3px)}}
.sound-toggle{position:fixed;right:max(14px,calc((100vw - 580px)/2 + 14px));top:14px;z-index:70;width:42px;height:42px;border-radius:50%;border:1px solid #3a475b;background:rgba(15,20,29,.9);color:#fff}
</style>
</head>
<body>
<div class="forge-bg"><div class="wall-beams"></div></div>
<button id="soundToggle" class="sound-toggle" title="効果音">🔊</button>
<div id="app">
<section id="title" class="screen title active">
 <div class="logo"></div>
 <h1>BLACK<br>SMITH<small>FORGE YOUR LEGEND</small></h1>
 <p class="sub">武器を鍛え、集め、共有する。<br>演出強化版 Ver0.4 α</p>
 <button id="enterBtn" class="primary">鍛冶場へ入る</button>
 <button id="rateBtn" class="secondary" style="margin-top:10px">排出率を見る</button>
</section>

<section id="home" class="screen">
 <div class="top"><div class="brand">BLACK Smith</div><div class="coin">🔥 <span data-coins>3000</span></div></div>
 <div class="card hero"><div class="weapon3d"><div class="blade"></div><div class="guard"></div><div class="grip"></div></div></div>
 <button class="primary" data-go="forge">新しい武器を鍛える</button>
 <div class="section"><h2>鍛冶場ニュース</h2><span>Ver0.4</span></div>
 <div class="card"><b>演出強化アップデート</b><p class="note">鍛冶場背景、炎、火花、3D風武器、レア演出、Web Audio効果音を追加しました。</p></div>
</section>

<section id="gacha" class="screen">
 <div class="top"><div class="brand">召喚炉</div><div class="coin">🔥 <span data-coins>3000</span></div></div>
 <div class="card">
  <div id="gachaResult" class="result"><div><div class="resultIcon">🔥</div><div class="meta">炉に火を入れて武器を召喚</div></div></div>
  <div class="grid2"><button class="secondary" data-draw="1">1回 / 100</button><button class="primary" data-draw="10">10回 / 900</button></div>
  <p class="note">BLACK Smith 0.048%、成長型等級コモン 0.002%。その他は仮配分です。</p>
 </div>
</section>

<section id="forge" class="screen">
 <div class="top"><div class="brand">鍛冶工房</div><div class="coin">🔥 <span data-coins>3000</span></div></div>
 <div class="card">
  <div id="forgeStage" class="forge-stage">
   <div class="furnace"><div class="furnace-mouth"></div></div>
   <div class="flame f1"></div><div class="flame f2"></div><div class="flame f3"></div>
   <div class="spark s1" style="--x:-28px"></div><div class="spark s2" style="--x:34px"></div><div class="spark s3" style="--x:-10px"></div><div class="spark s4" style="--x:18px"></div>
   <div id="forgePreview" class="forgeWeapon resultIcon">⚔️</div>
  </div>
  <div class="control"><label><span>武器タイプ</span><span id="typeLabel">刀剣</span></label><div id="choices" class="choices"></div></div>
  <div class="control"><label><span>長さ</span><span id="lengthLabel">60</span></label><input id="lengthRange" type="range" min="20" max="100" value="60"></div>
  <div class="control"><label><span>異形度</span><span id="weirdLabel">25</span></label><input id="weirdRange" type="range" min="0" max="100" value="25"></div>
  <div class="grid2"><button id="aiBtn" class="secondary">AI補助</button><button id="forgeBtn" class="primary">鍛造 / 150</button></div>
 </div>
</section>

<section id="inventory" class="screen">
 <div class="top"><div class="brand">武器庫</div><div class="coin"><span id="weaponCount">0</span> / 100</div></div>
 <div id="inventoryGrid" class="inventory"></div>
</section>

<nav id="nav" class="nav">
 <button data-page="home"><b>⌂</b>ホーム</button>
 <button data-page="gacha"><b>✦</b>ガチャ</button>
 <button data-page="forge"><b>⚒</b>鍛冶</button>
 <button data-page="inventory"><b>▦</b>武器庫</button>
</nav>

<div id="toast" class="toast"></div>
<div id="modal" class="modal"><div id="sheet" class="sheet"></div></div>
<div id="rarityFlash" class="rarity-flash"><div class="rarity-rays"></div><div class="rarity-core"></div></div>
</div>

<script>
(function(){
"use strict";
const TYPES=[{name:"刀剣",icon:"⚔️"},{name:"ハンマー",icon:"🔨"},{name:"槍",icon:"🔱"},{name:"斧",icon:"🪓"},{name:"ネタ武器",icon:"🍗"}];
const R=[{name:"成長型等級コモン",p:.002,color:"#72ffe1",tier:7},{name:"BLACK Smith",p:.048,color:"#ffd86a",tier:6},{name:"LEGEND",p:.45,color:"#ff6c48",tier:5},{name:"EPIC",p:3.5,color:"#bf75ff",tier:4},{name:"RARE",p:16,color:"#5ea8ff",tier:3},{name:"UNCOMMON",p:30,color:"#68da91",tier:2},{name:"COMMON",p:50,color:"#b7c0cd",tier:1}];
let state={coins:3000,weapons:[]},selected=0,soundOn=true,audioCtx=null;
try{const s=localStorage.getItem("blacksmith_v04");if(s)state=JSON.parse(s)}catch(e){}
const $=id=>document.getElementById(id);
function audio(){if(!soundOn)return null;if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function tone(freq,dur=.12,type="sine",gain=.07,delay=0){const c=audio();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,c.currentTime+delay);g.gain.linearRampToValueAtTime(gain,c.currentTime+delay+.01);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+delay+dur);o.connect(g).connect(c.destination);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur+.03)}
function sfx(name,tier=1){if(name==="click")tone(420,.07,"square",.025);if(name==="hammer"){tone(110,.15,"square",.09);tone(70,.18,"sawtooth",.05,.02)}if(name==="forge"){[220,330,440,660].forEach((f,i)=>tone(f,.18,"triangle",.06,i*.08))}if(name==="gacha"){const base=tier>=5?330:220;[base,base*1.25,base*1.5,base*2].forEach((f,i)=>tone(f,.22,"sine",.07,i*.11))}}
function save(){try{localStorage.setItem("blacksmith_v04",JSON.stringify(state))}catch(e){}render()}
function show(page){document.querySelectorAll(".screen").forEach(x=>{x.classList.remove("active");x.style.display=""});const t=$(page);if(t)t.classList.add("active");document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("active",x.dataset.page===page));if(page==="inventory")renderInventory();sfx("click")}
function enter(){$("nav").classList.add("show");show("home")}
function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1700)}
function roll(){let n=Math.random()*100,a=0;for(const r of R){a+=r.p;if(n<a)return r}return R[R.length-1]}
function code(){return"BS-"+Math.random().toString(36).slice(2,6).toUpperCase()+"-"+Math.random().toString(36).slice(2,8).toUpperCase()}
function make(source,typeIndex=Math.floor(Math.random()*TYPES.length)){const r=roll(),t=TYPES[typeIndex],ad=["黒鉄","灼熱","蒼雷","月影","暴食","歪曲","無銘","機巧"][Math.floor(Math.random()*8)];return{id:Date.now()+Math.random(),name:ad+"の"+t.name,icon:t.icon,rarity:r.name,color:r.color,tier:r.tier,source,level:1,code:code(),length:20+Math.floor(Math.random()*81),weird:Math.floor(Math.random()*101)}}
function flash(r){const f=$("rarityFlash");f.style.background="radial-gradient(circle,"+r.color+"bb,transparent 60%)";f.classList.remove("show");void f.offsetWidth;f.classList.add("show");if(r.tier>=5)document.body.classList.add("shake");setTimeout(()=>document.body.classList.remove("shake"),400)}
function draw(n){const cost=n===10?900:100;if(state.coins<cost)return toast("炉火が足りません");state.coins-=cost;const got=Array.from({length:n},()=>make("ガチャ"));state.weapons.unshift(...got);const best=got.slice().sort((a,b)=>b.tier-a.tier)[0];$("gachaResult").innerHTML='<div><div class="resultIcon">'+best.icon+'</div><div class="rarity" style="color:'+best.color+'">'+best.rarity+'</div><div class="weaponName">'+best.name+'</div><div class="meta">'+n+'個獲得</div></div>';flash(best);sfx("gacha",best.tier);save();toast(n+"個の武器を獲得")}
function initChoices(){$("choices").innerHTML=TYPES.map((t,i)=>'<button class="choice '+(i===selected?"active":"")+'" data-type="'+i+'"><div style="font-size:25px">'+t.icon+'</div><small>'+t.name+'</small></button>').join("")}
function updateForge(){const l=+$("lengthRange").value,w=+$("weirdRange").value,t=TYPES[selected];$("typeLabel").textContent=t.name;$("lengthLabel").textContent=l;$("weirdLabel").textContent=w;$("forgePreview").textContent=t.icon;$("forgePreview").style.transform="translateY(-40px) rotate("+((w-50)/4)+"deg) scale("+(0.75+l/170)+")"}
function ai(){selected=Math.floor(Math.random()*TYPES.length);$("lengthRange").value=20+Math.floor(Math.random()*81);$("weirdRange").value=Math.floor(Math.random()*101);initChoices();updateForge();sfx("gacha",3);toast("AIが造形案を生成")}
function forge(){if(state.coins<150)return toast("炉火が足りません");state.coins-=150;sfx("hammer");$("forgeStage").classList.add("shake");setTimeout(()=>{$("forgeStage").classList.remove("shake");const w=make("鍛造",selected);w.length=+$("lengthRange").value;w.weird=+$("weirdRange").value;state.weapons.unshift(w);flash(w);sfx("forge",w.tier);save();showWeapon(w);toast(w.name+"を鍛造")},420)}
function showWeapon(w){$("sheet").innerHTML='<h3>'+w.name+'</h3><div style="font-size:90px;text-align:center;filter:drop-shadow(0 12px 9px #000)">'+w.icon+'</div><div class="row"><span>レアリティ</span><b style="color:'+w.color+'">'+w.rarity+'</b></div><div class="row"><span>入手</span><b>'+w.source+'</b></div><div class="row"><span>造形</span><b>長さ '+w.length+' / 異形度 '+w.weird+'</b></div><p class="note">武器コード</p><div class="code">'+w.code+'</div><button class="primary" id="copyBtn" style="margin-top:14px">コードをコピー</button>';$("modal").classList.add("show");$("copyBtn").onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(w.code);sfx("click");toast("コピーしました")}}
function showRates(){$("sheet").innerHTML="<h3>排出率</h3>"+R.map(r=>'<div class="row"><span style="color:'+r.color+'">'+r.name+'</span><b>'+r.p+'%</b></div>').join("")+'<p class="note">BLACK Smithと成長型等級コモン以外は仮設定です。</p>';$("modal").classList.add("show")}
function renderInventory(){const box=$("inventoryGrid");if(!state.weapons.length){box.innerHTML='<div class="empty">まだ武器がありません。<br>ガチャまたは鍛冶で作ってみよう。</div>';return}box.innerHTML=state.weapons.map((w,i)=>'<button class="weaponCard" data-index="'+i+'"><span class="badge" style="color:'+w.color+'">'+w.rarity+'</span><div class="ico">'+w.icon+'</div><div class="nm">'+w.name+'</div><div class="sm">Lv.'+w.level+'・'+w.source+'</div></button>').join("")}
function render(){document.querySelectorAll("[data-coins]").forEach(x=>x.textContent=state.coins);$("weaponCount").textContent=state.weapons.length;renderInventory()}
$("enterBtn").onclick=enter;$("rateBtn").onclick=showRates;
document.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>show(b.dataset.go));
document.querySelectorAll("#nav button").forEach(b=>b.onclick=()=>show(b.dataset.page));
document.querySelectorAll("[data-draw]").forEach(b=>b.onclick=()=>draw(+b.dataset.draw));
$("choices").onclick=e=>{const b=e.target.closest("[data-type]");if(!b)return;selected=+b.dataset.type;initChoices();updateForge();sfx("click")};
$("inventoryGrid").onclick=e=>{const b=e.target.closest("[data-index]");if(b)showWeapon(state.weapons[+b.dataset.index])};
$("lengthRange").oninput=updateForge;$("weirdRange").oninput=updateForge;$("aiBtn").onclick=ai;$("forgeBtn").onclick=forge;
$("modal").onclick=e=>{if(e.target===$("modal"))$("modal").classList.remove("show")};
$("soundToggle").onclick=()=>{soundOn=!soundOn;$("soundToggle").textContent=soundOn?"🔊":"🔇";if(soundOn)sfx("click")};
initChoices();updateForge();render();
})();
</script>
</body>
</html>
