<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#090a0e">
  <title>BLACK Smith Ver0.6</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div id="app">
  <section id="title" class="screen active title-screen">
    <div class="logo-mark"></div>
    <h1>BLACK<br>SMITH</h1>
    <p class="sub">FORGE OF LEGENDS</p>
    <p class="slogan">魂を打て。<br>世界に一本だけの武器を。</p>
    <button class="primary" id="enterButton">鍛冶場へ入る</button>
    <small class="version">Ver0.6 clean refactor</small>
  </section>

  <section id="home" class="screen">
    <header class="topbar">
      <strong>BLACK Smith</strong>
      <span class="pill">鍛造 <b id="forgeRemaining">3/3</b></span>
    </header>

    <div class="card hero">
      <div class="hero-icon" id="heroWeapon">⚔️</div>
    </div>

    <button class="primary" data-go="forge">自由鍛造</button>

    <button class="card menu" data-go="blueprints">
      <span>📜</span><span><b>設計図</b><small>保存・読込・再利用</small></span><span>›</span>
    </button>

    <button class="card menu" data-go="inventory">
      <span>▦</span><span><b>武器保管庫</b><small>最大14本</small></span><span>›</span>
    </button>
  </section>

  <section id="forge" class="screen">
    <header class="topbar">
      <strong>自由鍛造</strong>
      <span class="pill" id="forgeCounter">3/3</span>
    </header>

    <div class="card">
      <div class="type-grid" id="weaponTypes"></div>

      <div class="editor-panel">
        <svg id="weaponEditor" class="weapon-editor" viewBox="0 0 1000 360" aria-label="武器形状エディタ"></svg>
        <div class="hint">白＝頂点 / 金＝ベジェハンドル</div>
      </div>

      <div class="toolbar">
        <button class="secondary" id="addPoint">点を追加</button>
        <button class="secondary" id="removePoint">選択点を削除</button>
        <button class="secondary" id="smoothPoint">滑らか</button>
        <button class="secondary" id="cornerPoint">角にする</button>
        <button class="secondary" id="mirrorShape">左右反転</button>
        <button class="secondary" id="resetShape">リセット</button>
      </div>

      <div id="shapeControls"></div>

      <div class="grid2">
        <button class="secondary" id="saveBlueprintFromForge">設計図保存</button>
        <button class="primary" id="startForge">本鍛造へ</button>
      </div>
    </div>
  </section>

  <section id="blueprints" class="screen">
    <header class="topbar">
      <strong>設計図</strong>
      <span class="pill"><b id="blueprintCount">0</b>件</span>
    </header>

    <div class="card">
      <input id="blueprintName" class="text-input" value="無銘の設計図" maxlength="30">
      <button class="primary mt12" id="saveBlueprint">現在の形を保存</button>
    </div>

    <div id="blueprintList"></div>
  </section>

  <section id="process" class="screen">
    <header class="topbar">
      <strong>鍛造工程</strong>
      <span class="pill">品質 <b id="quality">50</b></span>
    </header>

    <div class="steps" id="steps"></div>

    <div class="card">
      <div class="process-view" id="processIcon">🔥</div>
      <p class="center" id="processText"></p>
      <button class="primary" id="advanceForge"></button>
    </div>
  </section>

  <section id="inventory" class="screen">
    <header class="topbar">
      <strong>武器保管庫</strong>
      <span class="pill"><b id="inventoryCount">0</b>/14</span>
    </header>
    <div class="weapon-grid" id="inventoryGrid"></div>
  </section>

  <nav class="nav" id="nav">
    <button data-go="home">ホーム</button>
    <button data-go="forge">自由鍛造</button>
    <button data-go="blueprints">設計図</button>
    <button data-go="inventory">保管庫</button>
  </nav>

  <div id="modal" class="modal">
    <div id="modalSheet" class="modal-sheet"></div>
  </div>

  <div id="toast" class="toast"></div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
